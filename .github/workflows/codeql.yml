name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "37 3 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: analyze-cpp-qt
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Qt
        uses: jurplel/install-qt-action@v4.3.1
        with:
          version: 6.11.0
          aqtversion: ==3.3.*
          host: linux
          target: desktop
          arch: linux_gcc_64

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Prepare scripts
        run: |
          chmod +x ./scripts/build.sh

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: c-cpp
          build-mode: manual
          queries: security-extended,security-and-quality

      # CodeQL needs to observe real compiler invocations for C/C++.
      # The repo's Qt/CMake preset is more reliable than CodeQL autobuild here.
      - name: Build for CodeQL
        run: |
          ./scripts/build.sh --preset linux-ninja-debug --skip-tests --fresh

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:c-cpp"
          paths-ignore:
            - 'build/**'
